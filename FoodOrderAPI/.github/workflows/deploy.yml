
name: Build and Deploy API

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: food-order-api-prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ✅ FIXED PATH HERE
      - name: Restore
        run: dotnet restore ./FoodOrderAPI/FoodOrderAPI.csproj

      - name: Build
        run: dotnet build ./FoodOrderAPI/FoodOrderAPI.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ./FoodOrderAPI/FoodOrderAPI.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .
