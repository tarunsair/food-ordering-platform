name: Build and Deploy FoodOrder API

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: your-azure-app-name
  DOTNET_VERSION: 8.0.x

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. Restore dependencies (FIXED PATH)
      - name: Restore
        run: dotnet restore ./FoodOrderAPI.csproj

      # 4. Build project (THIS FIXES YOUR ERROR)
      - name: Build
        run: dotnet build ./FoodOrderAPI.csproj -c Release --no-restore

      # 5. Publish
      - name: Publish
        run: dotnet publish ./FoodOrderAPI.csproj -c Release -o ./publish

      # 6. Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 1. Download build artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api

      # 2. Deploy to Azure App Service
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .
